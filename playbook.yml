---
- name: Build a new Mac
  hosts: mac
  connection: local
  gather_facts: true

  pre_tasks:
    # Some Homebrew casks call `sudo` finish installing. That nested sudo
    # call has no controlling terminal to prompt on, so it just fails unless
    # a sudo ticket for this user is already warm. This seeds one,
    # then keeps it refreshed in the background for the rest of the run.
    - name: Seed a sudo ticket for this user
      ansible.builtin.command: /usr/bin/true
      become: true
      changed_when: false
      tags: always

    - name: Keep the sudo ticket warm for the rest of the run
      ansible.builtin.shell: |
        for i in $(seq 1 90); do
          sudo -n true 2>/dev/null
          sleep 60
        done
      async: 5400
      poll: 0
      changed_when: false
      tags: always

  roles:
    - role: homebrew
      tags: homebrew
    - role: mac_app_store
      tags: mac_app_store
    - role: macos_settings
      tags: macos_settings
