---
- name: Determine Homebrew prefix for this CPU architecture
  ansible.builtin.set_fact:
    homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts.machine == 'arm64' else '/usr/local' }}"

- name: Check whether Homebrew is already installed
  ansible.builtin.stat:
    path: "{{ homebrew_prefix }}/bin/brew"
  register: homebrew_bin

- name: Install Homebrew
  ansible.builtin.shell: |
    NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not homebrew_bin.stat.exists
  register: homebrew_install
  changed_when: homebrew_install.rc == 0

# All subsequent Homebrew tasks need brew on PATH — the shell profile that
# `brew shellenv` normally patches hasn't been sourced in this process yet.
- name: Run remaining Homebrew tasks with brew on PATH
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ homebrew_prefix }}/sbin:{{ ansible_facts.env.PATH }}"
  block:
    - name: Tap additional Homebrew repositories
      community.general.homebrew_tap:
        name: "{{ homebrew_taps }}"
        state: present

    # Homebrew 6.0+ requires taps to be explicitly trusted before it'll load
    # their formulae/casks/commands — domt4/autoupdate ships the `brew
    # autoupdate` external command, which is exactly the kind of thing this
    # gates. See https://github.com/Homebrew/brew/blob/main/docs/Tap-Trust.md
    - name: List currently trusted Homebrew taps/items
      ansible.builtin.command: brew trust
      register: homebrew_trusted
      changed_when: false
      failed_when: false

    - name: Trust additional Homebrew taps
      ansible.builtin.command: "brew trust {{ item }}"
      loop: "{{ homebrew_taps }}"
      when: item not in (homebrew_trusted.stdout | default(''))
      changed_when: true

    - name: Install Homebrew formulas
      community.general.homebrew:
        name: "{{ homebrew_formulas }}"
        state: present

    - name: Install Homebrew casks
      community.general.homebrew_cask:
        name: "{{ homebrew_casks }}"
        state: present

    - name: Check whether homebrew-autoupdate is already scheduled
      ansible.builtin.stat:
        path: "{{ homebrew_autoupdate_plist }}"
      register: homebrew_autoupdate_status

    # ~/Library/LaunchAgents isn't guaranteed to exist on a fresh account —
    # it's normally created the first time something writes to it, which on
    # a freshly-provisioned VM may not have happened yet. `brew autoupdate
    # start` needs it to already be there to drop its plist into.
    - name: Ensure ~/Library/LaunchAgents exists
      ansible.builtin.file:
        path: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents"
        state: directory
        mode: "0755"
      when: not homebrew_autoupdate_status.stat.exists

    - name: Start homebrew-autoupdate on a schedule
      ansible.builtin.command: "brew autoupdate start {{ homebrew_autoupdate_args }}"
      when: not homebrew_autoupdate_status.stat.exists
