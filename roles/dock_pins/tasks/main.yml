---
# Hand-rolled `defaults write com.apple.dock persistent-apps ...` (both the
# -array-of-separate-elements form and the single "( {...}, {...} )"
# collection-literal form) reliably produced "?" icons — the Dock never
# resolved the tiles either way. dockutil is a small, actively-maintained
# tool purpose-built for this exact job (https://github.com/dockutil/dockutil)
# and sidesteps the whole class of ASCII-plist-literal guesswork.
- name: Check which pinned Dock apps are actually installed
  ansible.builtin.stat:
    # dockutil needs a real absolute path — a leading ~ isn't expanded the
    # way a shell would, so it has to be resolved to the real home
    # directory first, e.g. for apps installed per-user
    # (~/Applications/Chromium Apps.localized/...).
    path: "{{ item | regex_replace('^~/', ansible_facts.env.HOME + '/') }}"
  loop: "{{ dock_pinned_apps }}"
  loop_control:
    label: "{{ item }}"
  register: dock_pinned_apps_stat

- name: Warn about Dock apps that aren't installed
  ansible.builtin.debug:
    msg: "Not pinning {{ item.item }} to the Dock — it isn't installed"
  loop: "{{ dock_pinned_apps_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: not item.stat.exists

# Clear the Dock first so re-running this doesn't just keep appending, and
# so whatever macOS ships pinned by default gets replaced rather than kept
# alongside dock_pinned_apps. Guarded so a run where none of the requested
# apps are actually installed yet doesn't wipe the Dock down to empty.
- name: Clear existing Dock pins
  ansible.builtin.command: dockutil --remove all --no-restart
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts.env.PATH }}"
  when: dock_pinned_apps_stat.results | selectattr('stat.exists') | list | length > 0
  changed_when: true

- name: Pin apps to the Dock
  ansible.builtin.command: dockutil --add "{{ item.stat.path }}" --no-restart
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts.env.PATH }}"
  loop: "{{ dock_pinned_apps_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists
  changed_when: true
  notify: Restart Dock
