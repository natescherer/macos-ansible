---

- name: Check current appearance mode
  ansible.builtin.command: >-
    osascript -e 'tell application "System Events" to tell appearance preferences to get dark mode'
  register: dark_mode_current
  changed_when: false

- name: Enable Dark Mode
  ansible.builtin.command: >-
    osascript -e 'tell application "System Events" to tell appearance preferences to set dark mode to true'
  when: dark_mode_current.stdout | trim != 'true'

- name: Configure Dock behavior
  community.general.osx_defaults:
    domain: com.apple.dock
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - { key: tilesize, type: int, value: 44 }
    - { key: mineffect, type: string, value: genie }
    - { key: minimize-to-application, type: bool, value: true }
    - { key: autohide, type: bool, value: false }
    - { key: launchanim, type: bool, value: true }
    - { key: show-process-indicators, type: bool, value: true }
    - { key: show-recents, type: bool, value: false }
  notify: Restart Dock

- name: Enable Live Text
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleLiveTextEnabled
    type: bool
    value: true
    state: present

- name: Set menu bar clock to analog
  community.general.osx_defaults:
    domain: com.apple.menuextra.clock
    key: IsAnalog
    type: bool
    value: true
    state: present
  notify: Restart Control Center

- name: Prevent sleep on power adapter when display is off
  ansible.builtin.command: pmset -c disablesleep 1
  become: true
  changed_when: true

- name: Set Firefox as the default browser and web-page handler
  ansible.builtin.command: "duti -s org.mozilla.firefox {{ item }} all"
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  loop:
    - public.html
    - http
    - https
  changed_when: true

- name: Check whether Outlook is installed
  ansible.builtin.stat:
    path: "/Applications/Microsoft Outlook.app"
  register: outlook_app

- name: Associate .ics files with Outlook
  ansible.builtin.command: "duti -s com.microsoft.Outlook .ics all"
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_env.PATH }}"
  when: outlook_app.stat.exists
  changed_when: true

- name: Enable Touch ID for sudo
  ansible.builtin.shell: |
    sed "s/^#auth/auth/" /etc/pam.d/sudo_local.template > /etc/pam.d/sudo_local
  become: true
  args:
    creates: /etc/pam.d/sudo_local
