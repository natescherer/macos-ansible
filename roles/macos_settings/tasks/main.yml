---

- name: Check current appearance mode
  ansible.builtin.command: >-
    osascript -e 'tell application "System Events" to tell appearance preferences to get dark mode'
  register: dark_mode_current
  changed_when: false

- name: Enable Dark Mode
  ansible.builtin.command: >-
    osascript -e 'tell application "System Events" to tell appearance preferences to set dark mode to true'
  when: dark_mode_current.stdout | trim != 'true'

- name: Configure Dock behavior
  community.general.osx_defaults:
    domain: com.apple.dock
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - { key: tilesize, type: int, value: 44 }
    - { key: mineffect, type: string, value: genie }
    - { key: minimize-to-application, type: bool, value: true }
    - { key: autohide, type: bool, value: false }
    - { key: launchanim, type: bool, value: true }
    - { key: show-process-indicators, type: bool, value: true }
    - { key: show-recents, type: bool, value: false }
  notify: Restart Dock

- name: Enable Live Text
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleLiveTextEnabled
    type: bool
    value: true
    state: present

- name: Set menu bar clock to analog
  community.general.osx_defaults:
    domain: com.apple.menuextra.clock
    key: IsAnalog
    type: bool
    value: true
    state: present
  notify: Restart Control Center

- name: Prevent sleep on power adapter when display is off
  ansible.builtin.command: pmset -c disablesleep 1
  become: true
  changed_when: true

- name: Configure Finder behavior
  community.general.osx_defaults:
    domain: com.apple.finder
    key: "{{ item.key }}"
    type: "{{ item.type }}"
    value: "{{ item.value }}"
    state: present
  loop:
    - { key: NewWindowTarget, type: string, value: PfHm }
    - { key: ShowRecentTags, type: bool, value: false }
    - { key: _FXSortFoldersFirst, type: bool, value: true }
    - { key: ShowTabView, type: bool, value: true }
    - { key: ShowPathbar, type: bool, value: true }
    - { key: ShowStatusBar, type: bool, value: true }
    - { key: FXPreferredViewStyle, type: string, value: Nlsv }
    - { key: AppleShowAllFiles, type: bool, value: true }
  notify: Restart Finder

- name: Show all filename extensions in Finder
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: AppleShowAllExtensions
    type: bool
    value: true
    state: present
  notify: Restart Finder

# Setting the default web browser (the http URL scheme, which macOS also
# propagates to https and public.html) always pops a system confirmation
# dialog that a human has to click through — a deliberate anti-hijacking
# measure, not a tooling limitation. duti can't get past this (it just
# errors out non-interactively), so we use utiluti instead: it's a modern,
# signed/notarized replacement that handles the same dialog properly rather
# than choking on it. The command blocks until the dialog is answered — if
# nobody's at the screen, the playbook just waits there — and if the user
# rejects the change, that's a non-zero exit we deliberately don't fail the
# play on (failed_when: false), since a "no" is a valid outcome, not a
# broken run. See https://github.com/scriptingosx/utiluti

- name: Check whether Firefox is installed
  ansible.builtin.stat:
    path: "/Applications/Firefox.app"
  register: firefox_app

- name: Force Launch Services to (re)register Firefox
  ansible.builtin.command: >-
    /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister
    -f /Applications/Firefox.app
  when: firefox_app.stat.exists
  changed_when: false

- name: Set Firefox as the default browser
  ansible.builtin.command: utiluti url set http org.mozilla.firefox
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts.env.PATH }}"
  when: firefox_app.stat.exists
  changed_when: true
  failed_when: false

- name: Check whether Outlook is installed
  ansible.builtin.stat:
    path: "/Applications/Microsoft Outlook.app"
  register: outlook_app

# The below fixes a possible race condition with Launch Services not recognizing newly installed apps immediately.
- name: Force Launch Services to (re)register Outlook
  ansible.builtin.command: >-
    /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister
    -f "/Applications/Microsoft Outlook.app"
  when: outlook_app.stat.exists
  changed_when: false

- name: Set Outlook as the default mail app
  ansible.builtin.command: utiluti url set mailto com.microsoft.Outlook
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts.env.PATH }}"
  when: outlook_app.stat.exists
  changed_when: true
  failed_when: false

# .ics is a file-type/UTI association rather than a URL scheme — still
# scriptable as of this writing, but macOS 26.4+ started requiring the same
# kind of confirmation for some file-type changes too, so this may start
# prompting the same way on a future OS update.
- name: Associate .ics files with Outlook
  ansible.builtin.command: utiluti type set extension:ics com.microsoft.Outlook
  environment:
    PATH: "{{ homebrew_prefix }}/bin:{{ ansible_facts.env.PATH }}"
  when: outlook_app.stat.exists
  changed_when: true
  failed_when: false

- name: Enable Touch ID for sudo
  ansible.builtin.shell: |
    sed "s/^#auth/auth/" /etc/pam.d/sudo_local.template > /etc/pam.d/sudo_local
  become: true
  args:
    creates: /etc/pam.d/sudo_local
