---
# Homebrew taps
homebrew_taps:
  - domt4/autoupdate

# homebrew-autoupdate schedule/flags — see https://github.com/DomT4/homebrew-autoupdate
# Runs every 43200 seconds (12h), upgrading + cleaning up automatically.
homebrew_autoupdate_args: "43200 --upgrade --cleanup --immediate --sudo"
homebrew_autoupdate_plist: "{{ ansible_facts.env.HOME }}/Library/LaunchAgents/com.github.domt4.homebrew-autoupdate.plist"

# Formulas (CLI tools / non-GUI packages)
homebrew_formulas:
  - chezmoi
  - coreutils
  - curl
  - fzf
  - git
  - jq
  - mas
  - micro
  - mise
  - pinentry-mac
  - sheldon
  - starship
  - utiluti
  - yq

# Casks (GUI apps / fonts)
homebrew_casks:
  - 1password-cli
  - alt-tab
  - anylist
  - brave-browser
  - discord
  - docker-desktop
  - firefox
  - font-cascadia-mono-nf
  - ghostty
  - git-credential-manager
  - keka
  - macshot
  - megasync
  - obsidian
  - stats
  - thaw
  - visual-studio-code
  - vlc
  - vscodium

# Mac App Store apps: name -> App Store numeric id
